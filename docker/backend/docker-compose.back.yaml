services:
  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
    volumes:
      # 📦 Persistencia solo de storage (logs, cache, uploads)
      - backend_storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_KEY: ${APP_KEY} # 🔐 Nunca hardcodeado
      APP_URL: ${APP_URL}

      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST} # 🔗 Nombre del servicio Docker
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      LOG_CHANNEL: stderr # 📊 Logs compatibles con Docker/Dokploy
    restart: unless-stopped
    healthcheck:
      # 🩺 Verifica que PHP-FPM esté escuchando en el puerto 9000
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app_net

  nginx-backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: nginx-backend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - app_net
    healthcheck:
      # 🩺 Endpoint estático, no depende de PHP-FPM
      test: ["CMD-SHELL", "wget -qO- http://localhost/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app_net:
    external: true

volumes:
  backend_storage:
