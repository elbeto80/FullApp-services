services:
  database:
    # image: mysql:8.0.45
    # # 🚫 NO exponemos el puerto 3306 en producción, MySQL solo debe ser accesible desde la red Docker
    # environment:
    #   MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # 🔐 Secret gestionado por Dokploy
    #   MYSQL_DATABASE: ${DB_DATABASE}
    #   MYSQL_USER: ${DB_USERNAME}
    #   MYSQL_PASSWORD: ${DB_PASSWORD}
    # volumes:
    #   - mysql_data:/var/lib/mysql
    # restart: unless-stopped
    # healthcheck:
    #   # 🩺 Healthcheck para evitar race conditions con Laravel
    #   test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    # networks:
    #   - app_net
    image: postgres:17.8-alpine3.23
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME}", "-d", "${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: backend
    volumes:
      # 📦 Persistencia solo de storage (logs, cache, uploads)
      - backend_storage:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_KEY: ${APP_KEY} # 🔐 Nunca hardcodeado
      APP_URL: ${APP_URL}

      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST} # 🔗 Nombre del servicio Docker
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      LOG_CHANNEL: stderr # 📊 Logs compatibles con Docker/Dokploy
    restart: unless-stopped
    depends_on:
      database:
        # ⏳ Laravel solo arranca cuando MySQL está listo
        condition: service_healthy
    healthcheck:
      # 🩺 Healthcheck simple del backend
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app_net

  nginx-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: nginx-backend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app_net

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    networks:
      - app_net

volumes:
  backend_storage:
  # mysql_data:
  postgres_data:

networks:
  app_net:
    driver: bridge
