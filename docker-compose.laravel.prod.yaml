services:
  laravel:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
      target: prod
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - laravel
    volumes:
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
      - ./laravel:/var/www