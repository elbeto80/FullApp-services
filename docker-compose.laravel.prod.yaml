services:
  database:
    container_name: mysql
    image: mysql:8.0.45
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: x
      MYSQL_DATABASE: laravel
      MYSQL_USER: beto
      MYSQL_PASSWORD: x
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-px"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    volumes:
      - laravel_code:/var/www/html
      - ./docker/php/prod.ini:/usr/local/etc/php/conf.d/prod.ini
      - ./docker/php/zz-env.conf:/usr/local/etc/php-fpm.d/zz-env.conf
    expose:
      - "9000"
    depends_on:
      database:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    depends_on:
      - backend
    volumes:
      - laravel_code:/var/www/html:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf
    expose:
      - "80"

volumes:
  laravel_code:
  mysql_data:
