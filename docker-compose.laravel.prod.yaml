services:
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    volumes:
      - laravel_code:/var/www/html
      - ./docker/php/prod.ini:/usr/local/etc/php/conf.d/prod.ini
      - ./docker/php/zz-env.conf:/usr/local/etc/php-fpm.d/zz-env.conf
    expose:
      - "9000"

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    depends_on:
      - backend
    volumes:
      - laravel_code:/var/www/html:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf
    expose:
      - "80"

volumes:
  laravel_code:
