services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: ./Docker/Dockerfile
      target: dev
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    stdin_open: true
    tty: true

  laravel:
    container_name: laravel
    build:
      context: .
      dockerfile: ./Docker/Dockerfile-laravel
    volumes:
      - ./laravel:/var/www
    working_dir: /var/www
    command: php-fpm


  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www
      - ./Docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel